name: Android Build CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
        
    - name: Make Gradle wrapper executable
      run: chmod +x ./gradlew
      
    - name: Clean build
      run: ./gradlew clean
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug -v --stacktrace 2>&1 || true
      
    - name: Check build outputs
      run: find app/build -name "*.apk" -type f 2>/dev/null || echo "No APK found"
      
    - name: Upload Debug APK if exists
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    - name: Build Status
      if: always()
      run: |
        echo "Build process completed"
        echo "Check artifacts for APK file"

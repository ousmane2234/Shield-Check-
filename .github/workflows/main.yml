name: Android Build CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ========================
    # 1. Checkout code
    # ========================
    - name: Checkout repository
      uses: actions/checkout@v4

    # ========================
    # 2. Setup Java (Android stable)
    # ========================
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # ========================
    # 3. Permissions Gradle
    # ========================
    - name: Make Gradle executable
      run: chmod +x gradlew

    # ========================
    # 4. Clean project
    # ========================
    - name: Clean project
      run: ./gradlew clean

    # ========================
    # 5. Build APK (DEBUG)
    # ========================
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --info

    # ========================
    # 6. Debug output (IMPORTANT)
    # ========================
    - name: List build outputs
      run: find . -type f -name "*.apk"

    # ========================
    # 7. Upload APK artifact
    # ========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-debug
        path: "**/*.apk"
        retention-days: 30

    # ========================
    # 8. Status final
    # ========================
    - name: Build Status
      if: always()
      run: echo "Build terminé avec succès"
